<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusAI — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080b14; --surface: #0e1420; --surface2: #141c2e;
      --border: rgba(99,131,255,0.15); --accent: #6383ff;
      --accent2: #a78bfa; --accent3: #34d399; --accent4: #fb923c;
      --text: #e8eaf6; --text-muted: #6b7280;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(99,131,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,131,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      background: rgba(8,11,20,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      background: linear-gradient(135deg,#fff,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-btn {
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; cursor: pointer; text-decoration: none; transition: all 0.2s;
    }
    .header-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; position: relative; }
    h2 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; }
    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 24px; position: relative; overflow: hidden; transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .stat-card.blue::before { background: var(--accent); }
    .stat-card.purple::before { background: var(--accent2); }
    .stat-card.green::before { background: var(--accent3); }
    .stat-card.orange::before { background: var(--accent4); }
    .stat-icon { font-size: 24px; margin-bottom: 12px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; line-height: 1; }
    .stat-label { color: var(--text-muted); font-size: 0.82rem; margin-top: 6px; }
    /* Charts row */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    @media(max-width:700px) { .charts-row { grid-template-columns: 1fr; } }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px;
    }
    .card-title { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 20px; font-size: 1rem; }
    /* Bar chart */
    .bar-chart { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: flex; align-items: center; gap: 12px; }
    .bar-label { width: 110px; font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; }
    .bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.8s ease; }
    .bar-val { font-size: 0.8rem; color: var(--text-muted); width: 30px; text-align: right; }
    /* Sparkline */
    .sparkline-wrap { position: relative; height: 140px; }
    canvas#sparkline { width: 100%; height: 140px; }
    /* Logs table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    th { text-align: left; padding: 10px 14px; color: var(--text-muted); font-weight: 500;
      border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 12px 14px; border-bottom: 1px solid rgba(99,131,255,0.05); vertical-align: top; }
    tr:hover td { background: rgba(99,131,255,0.03); }
    .role-badge {
      padding: 2px 8px; border-radius: 8px; font-size: 0.72rem; font-weight: 600;
    }
    .role-badge.user { background: rgba(99,131,255,0.15); color: var(--accent); }
    .role-badge.assistant { background: rgba(52,211,153,0.15); color: var(--accent3); }
    .intent-pill { padding: 2px 8px; border-radius: 8px; background: rgba(167,139,250,0.1); color: var(--accent2); font-size: 0.72rem; }
    .msg-content { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .refresh-btn {
      padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text); cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; margin-bottom: 16px; transition: all 0.2s;
    }
    .refresh-btn:hover { background: var(--surface2); border-color: var(--accent); }
    .loading { color: var(--text-muted); font-size: 0.9rem; padding: 20px; text-align: center; }
  </style>
</head>
<body>
<header>
  <div class="logo">📊 NexusAI Dashboard</div>
  <a href="/" class="header-btn">💬 Back to Chat</a>
</header>
<main>
  <h2>Analytics Overview</h2>
  <div class="stats-grid" id="statsGrid">
    <div class="loading">Loading stats…</div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">📈 Daily Messages (Last 7 Days)</div>
      <div class="sparkline-wrap">
        <canvas id="sparkline"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🎯 Top Intents</div>
      <div class="bar-chart" id="intentsChart"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📋 Recent Interaction Logs</div>
    <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Time</th><th>Session</th><th>Role</th><th>Message</th><th>Intent</th><th>Confidence</th><th>ms</th></tr>
        </thead>
        <tbody id="logsBody"><tr><td colspan="7" class="loading">Loading logs…</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<script>
async function loadData() {
  await Promise.all([loadStats(), loadLogs()]);
}

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const d = await res.json();
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card blue">
        <div class="stat-icon">💬</div>
        <div class="stat-value">${d.total_messages.toLocaleString()}</div>
        <div class="stat-label">Total Messages</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-icon">👥</div>
        <div class="stat-value">${d.total_sessions.toLocaleString()}</div>
        <div class="stat-label">Unique Sessions</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon">⚡</div>
        <div class="stat-value">${d.avg_response_time_ms}</div>
        <div class="stat-label">Avg Response (ms)</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-icon">🎯</div>
        <div class="stat-value">${d.top_intents.length > 0 ? d.top_intents[0].intent : '—'}</div>
        <div class="stat-label">Top Intent</div>
      </div>`;

    // Intents bar chart
    const intents = d.top_intents;
    if (intents.length > 0) {
      const max = intents[0].count;
      document.getElementById('intentsChart').innerHTML = intents.map(i => `
        <div class="bar-row">
          <div class="bar-label">${i.intent}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(i.count/max*100).toFixed(0)}%"></div></div>
          <div class="bar-val">${i.count}</div>
        </div>`).join('');
    } else {
      document.getElementById('intentsChart').innerHTML = '<div class="loading">No intent data yet</div>';
    }

    // Sparkline
    const daily = d.daily_messages.reverse();
    if (daily.length > 0) drawSparkline(daily);

  } catch(e) {
    document.getElementById('statsGrid').innerHTML = '<div class="loading">Error loading stats</div>';
  }
}

function drawSparkline(data) {
  const canvas = document.getElementById('sparkline');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = 280;
  const W = canvas.width, H = canvas.height;
  const pad = { top: 20, right: 20, bottom: 40, left: 40 };
  const w = W - pad.left - pad.right, h = H - pad.top - pad.bottom;
  const maxV = Math.max(...data.map(d => d.count), 1);
  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(99,131,255,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
  }

  // Area fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
  grad.addColorStop(0, 'rgba(99,131,255,0.3)');
  grad.addColorStop(1, 'rgba(99,131,255,0)');

  const pts = data.map((d, i) => ({
    x: pad.left + (i / (data.length - 1 || 1)) * w,
    y: pad.top + (1 - d.count / maxV) * h
  }));

  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length-1].x, H - pad.bottom);
  ctx.lineTo(pts[0].x, H - pad.bottom);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#6383ff';
  ctx.lineWidth = 3;
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // Labels
  ctx.fillStyle = 'rgba(107,114,128,0.8)';
  ctx.font = `${22}px DM Sans`;
  ctx.textAlign = 'center';
  data.forEach((d, i) => {
    const x = pad.left + (i / (data.length - 1 || 1)) * w;
    ctx.fillText(d.date?.slice(5) || '', x, H - 6);
  });
}

async function loadLogs() {
  try {
    const res = await fetch('/api/logs?limit=50');
    const d = await res.json();
    const tbody = document.getElementById('logsBody');
    if (!d.logs.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="loading">No messages yet. Start chatting!</td></tr>';
      return;
    }
    tbody.innerHTML = d.logs.map(l => `
      <tr>
        <td>${new Date(l.timestamp).toLocaleString()}</td>
        <td style="color:var(--text-muted);font-size:0.75rem">${l.session_id?.slice(0,8)}…</td>
        <td><span class="role-badge ${l.role}">${l.role}</span></td>
        <td><div class="msg-content" title="${l.content.replace(/"/g,'&quot;')}">${escHtml(l.content)}</div></td>
        <td>${l.intent ? `<span class="intent-pill">${l.intent}</span>` : '—'}</td>
        <td>${l.confidence ? (l.confidence * 100).toFixed(0) + '%' : '—'}</td>
        <td>${l.response_time_ms ?? '—'}</td>
      </tr>`).join('');
  } catch {
    document.getElementById('logsBody').innerHTML = '<tr><td colspan="7" class="loading">Error loading logs</td></tr>';
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
